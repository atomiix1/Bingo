<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bingo 1-90</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2d2d55);
      color: white;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      max-width: 100%;
      margin: auto;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .current-ball {
      width: 180px;
      height: 180px;
      margin: 20px auto;
      border-radius: 50%;
      background: #ffd54f;
      color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 5rem;
      font-weight: bold;
      box-shadow: 0 0 30px rgba(255,255,255,0.3);
      transition: transform 0.3s ease;
    }

    .current-ball.pulse {
      animation: pulse 0.5s ease-out;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
      }
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255, 208, 79, 0.95);
      color: #222;
      padding: 20px 30px;
      border-radius: 12px;
      font-size: 2rem;
      font-weight: bold;
      z-index: 1000;
      opacity: 0;
      transform: translateX(400px);
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .notification.show {
      opacity: 1;
      transform: translateX(0);
    }

    .notification.disappear {
      opacity: 0;
      transform: translateX(400px);
    }

    .tts-status {
      margin-bottom: 15px;
      font-size: 0.9rem;
      color: #b0bec5;
    }

    .tts-status.available {
      color: #81c784;
    }

    .tts-status.unavailable {
      color: #ef5350;
    }

    .buttons {
      margin: 20px 0;
    }

    button {
      background: #ff4081;
      color: white;
      border: none;
      padding: 15px 25px;
      margin: 10px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background: #ff5c95;
    }

    button:disabled {
      background: #777;
      cursor: not-allowed;
      transform: none;
    }

    #autoplayBtn {
      background: #4caf50;
      font-size: 1.1rem;
      font-weight: bold;
      min-width: 160px;
    }

    #autoplayBtn:hover {
      background: #45a049;
    }

    #autoplayBtn.paused {
      background: #ff9800;
    }

    #autoplayBtn.paused:hover {
      background: #e68900;
    }

    .speed-control {
      margin-top: 20px;
    }

    .speed-control label {
      display: block;
      margin-bottom: 10px;
      font-size: 1rem;
    }

    .speed-control input[type="range"] {
      width: 250px;
      max-width: 90%;
    }

    .remaining {
      margin-bottom: 25px;
      font-size: 1.1rem;
    }

    .section {
      margin-top: 35px;
    }

    .balls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(50px, 1fr));
      gap: 10px;
      margin-top: 15px;
    }

    .ball {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: auto;
      font-weight: bold;
      user-select: none;
    }

    .history-ball {
      background: white;
      color: #222;
    }

    .tracker-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .tracker-ball {
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.15);
      color: white;
      transition: 0.2s;
    }

    .tracker-ball.drawn {
      background: #4caf50;
      border-color: #81c784;
      color: white;
      transform: scale(1.05);
    }

    .info-box {
      background: rgba(100, 100, 150, 0.3);
      border-left: 4px solid #4caf50;
      padding: 15px;
      margin: 15px 0;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      .tracker-grid {
        grid-template-columns: repeat(5, 1fr);
      }

      .current-ball {
        width: 140px;
        height: 140px;
        font-size: 4rem;
      }

      .notification {
        top: 10px;
        right: 10px;
        left: 10px;
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <h1>🎱 Bingo 1-90</h1>

  <div class="tts-status" id="ttsStatus">
    ✓ Sonido disponible
  </div>

  <div class="info-box" id="infoBox" style="display:none;">
    Cargando audios... Por favor espera.
  </div>

  <div class="current-ball" id="currentBall">?</div>

  <div class="buttons">
    <button id="autoplayBtn">Iniciar Partida</button>
    <button id="drawBtn">Sacar bola</button>
    <button id="resetBtn">Reiniciar bingo</button>
  </div>

  <div class="speed-control">
    <label for="speedSlider">
      Tiempo entre bolas:
      <span id="speedValue">10</span> segundos
    </label>

    <input
      type="range"
      id="speedSlider"
      min="2"
      max="30"
      value="10"
      step="1"
    />
  </div>

  <div class="remaining" id="remaining">
    Quedan 90 bolas
  </div>

  <div class="section">
    <h2>Historial</h2>
    <div class="balls-grid" id="history"></div>
  </div>

  <div class="section">
    <h2>Tracker del tablero</h2>
    <div class="tracker-grid" id="tracker"></div>
  </div>

</div>

<div class="notification" id="notification"></div>
<audio id="audioPlayer"></audio>

<script>
  const autoplayBtn = document.getElementById("autoplayBtn");
  const drawBtn = document.getElementById("drawBtn");
  const resetBtn = document.getElementById("resetBtn");

  const currentBall = document.getElementById("currentBall");
  const historyDiv = document.getElementById("history");
  const trackerDiv = document.getElementById("tracker");
  const remainingDiv = document.getElementById("remaining");
  const notificationDiv = document.getElementById("notification");
  const ttsStatus = document.getElementById("ttsStatus");
  const infoBox = document.getElementById("infoBox");
  const audioPlayer = document.getElementById("audioPlayer");

  const speedSlider = document.getElementById("speedSlider");
  const speedValue = document.getElementById("speedValue");

  let availableNumbers = [];
  let drawnNumbers = [];
  let audioCache = {};
  let audioLoading = false;

  let autoplayActive = false;
  let autoplayInterval = null;

  let autoplayDelay = 10000;

  // Detectar soporte de Web Speech API
  const ttsSupported = typeof window.SpeechSynthesisUtterance !== 'undefined' && 
                       typeof window.speechSynthesis !== 'undefined';

  // URLs de audios pregrabados en múltiples formatos y CDNs
  const AUDIO_URLS = {
    '1': ['https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/text-to-speech/1.wav'],
    // Alternativa: usar un servidor propio o Cloudinary
  };

  function generateAudioUrl(number) {
    // Generar URL usando API de síntesis online
    // Usando forvo (pronunciación de hablantes nativos)
    return `https://forvo.com/download/mp3/${number}/es/`;
  }

  function updateTtsStatus() {
    if (!ttsSupported) {
      ttsStatus.textContent = "🔊 Modo: Audios grabados";
      ttsStatus.classList.add("unavailable");
    } else {
      ttsStatus.classList.add("available");
    }
  }

  function showNotification(text) {
    notificationDiv.textContent = text;
    notificationDiv.classList.remove("disappear");
    notificationDiv.classList.add("show");

    // Reproducir animación de pulso en la bola
    currentBall.classList.add("pulse");

    setTimeout(() => {
      notificationDiv.classList.remove("show");
      notificationDiv.classList.add("disappear");
    }, 2000);

    setTimeout(() => {
      currentBall.classList.remove("pulse");
    }, 500);
  }

  function playAudio(number) {
    try {
      // Usar Web Audio API para crear síntesis en el navegador
      const synth = window.speechSynthesis;
      
      // Primero intentar con TTS del sistema
      if (ttsSupported && synth) {
        try {
          synth.cancel();
          const utterance = new SpeechSynthesisUtterance(String(number));
          utterance.lang = 'es-ES';
          utterance.rate = 0.9;
          utterance.pitch = 1.0;
          utterance.volume = 1.0;
          
          synth.speak(utterance);
          return;
        } catch (error) {
          console.log("TTS falló, intentando alternativa...");
        }
      }

      // Fallback: reproducir audio generado
      // Usar tts.ai o similares
      const ttsUrl = `https://api.elevenlabs.io/v1/text-to-speech?text=${encodeURIComponent(number)}&language_code=es`;
      
      // Como alternativa más simple, usar fetch de audio web
      const audioElement = document.createElement('audio');
      audioElement.setAttribute('crossorigin', 'anonymous');
      
      // Intentar con diferentes servicios
      const urls = [
        `https://tts.api.cloud.yandex.net/v1/say?text=${number}&lang=es&speaker=omazh`,
        `https://translate.google.com/translate_tts?ie=UTF-8&q=${number}&tl=es-ES&client=tw-ob`,
      ];

      let urlIndex = 0;

      function tryPlayAudio() {
        if (urlIndex >= urls.length) {
          console.warn("No se pudo reproducir el audio");
          return;
        }

        audioElement.src = urls[urlIndex];
        audioElement.play().catch(() => {
          urlIndex++;
          tryPlayAudio();
        });
      }

      tryPlayAudio();

    } catch (error) {
      console.error("Error al reproducir audio:", error);
    }
  }

  function speak(text) {
    showNotification(text);
    playAudio(text);
  }

  function createTracker() {
    trackerDiv.innerHTML = "";

    for (let i = 1; i <= 90; i++) {
      const ball = document.createElement("div");

      ball.className = "ball tracker-ball";
      ball.id = `tracker-${i}`;
      ball.textContent = i;

      trackerDiv.appendChild(ball);
    }
  }

  function initGame() {
    availableNumbers = Array.from({ length: 90 }, (_, i) => i + 1);

    drawnNumbers = [];

    currentBall.textContent = "?";
    historyDiv.innerHTML = "";

    remainingDiv.textContent = "Quedan 90 bolas";

    drawBtn.disabled = false;
    autoplayBtn.disabled = false;

    autoplayBtn.textContent = "Iniciar Partida";
    autoplayBtn.classList.remove("paused");

    autoplayActive = false;

    stopAutoplay();
    createTracker();
  }

  function drawBall() {
    if (availableNumbers.length === 0) {
      speak("No quedan más bolas");

      drawBtn.disabled = true;

      stopAutoplay();

      return;
    }

    const randomIndex =
      Math.floor(Math.random() * availableNumbers.length);

    const number =
      availableNumbers.splice(randomIndex, 1)[0];

    drawnNumbers.push(number);

    currentBall.textContent = number;

    const historyBall = document.createElement("div");

    historyBall.className = "ball history-ball";
    historyBall.textContent = number;

    historyDiv.prepend(historyBall);

    const trackerBall =
      document.getElementById(`tracker-${number}`);

    trackerBall.classList.add("drawn");

    remainingDiv.textContent =
      `Quedan ${availableNumbers.length} bolas`;

    speak(`${number}`);

    if (availableNumbers.length === 0) {
      speak("Fin del bingo");

      drawBtn.disabled = true;

      stopAutoplay();
    }
  }

  function startAutoplay() {
    if (autoplayActive) return;

    autoplayActive = true;

    autoplayBtn.textContent = "Pausa";
    autoplayBtn.classList.add("paused");

    drawBtn.disabled = true;

    autoplayInterval = setInterval(() => {
      if (availableNumbers.length > 0) {
        drawBall();
      }
    }, autoplayDelay);
  }

  function stopAutoplay() {
    autoplayActive = false;

    autoplayBtn.textContent = "Iniciar Partida";
    autoplayBtn.classList.remove("paused");

    drawBtn.disabled = false;

    if (autoplayInterval) {
      clearInterval(autoplayInterval);
      autoplayInterval = null;
    }
  }

  function toggleAutoplay() {
    if (autoplayActive) {
      stopAutoplay();
    } else {
      startAutoplay();
    }
  }

  speedSlider.addEventListener("input", () => {
    const seconds = parseInt(speedSlider.value);

    speedValue.textContent = seconds;

    autoplayDelay = seconds * 1000;

    // Reinicia el intervalo si ya está activo
    if (autoplayActive) {
      clearInterval(autoplayInterval);

      autoplayInterval = setInterval(() => {
        if (availableNumbers.length > 0) {
          drawBall();
        }
      }, autoplayDelay);
    }
  });

  autoplayBtn.addEventListener("click", toggleAutoplay);

  drawBtn.addEventListener("click", drawBall);

  resetBtn.addEventListener("click", initGame);

  // Inicializar
  updateTtsStatus();
  initGame();
  infoBox.style.display = "none";
</script>

</body>
</html>
